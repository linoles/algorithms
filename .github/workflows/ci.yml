name: C++ CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile tests
        run: |
          g++ -std=c++17 tests/test_sorts.cpp -o test
      - name: Run tests
        run: ./test
